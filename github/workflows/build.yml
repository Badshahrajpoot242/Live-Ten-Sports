name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'

      - name: Setup Flutter (latest stable)
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: latest

      - name: Ensure android/app directory exists
        run: mkdir -p android/app

      - name: Add placeholder google-services.json if missing
        run: |
          if [ ! -f android/app/google-services.json ]; then
            cat > android/app/google-services.json <<'JSON'
{
  "project_info": {
    "project_number": "000000000000",
    "project_id": "placeholder-project-id",
    "storage_bucket": "placeholder-project-id.appspot.com"
  },
  "client": [
    {
      "client_info": {
        "mobilesdk_app_id": "1:000000000000:android:placeholder",
        "android_client_info": {
          "package_name": "com.cricket.livehd"
        }
      }
    }
  ],
  "configuration_version": "1"
}
JSON
          fi

      - name: Add placeholder firebase_options.dart if missing
        run: |
          if [ ! -f lib/firebase_options.dart ]; then
            mkdir -p lib
            cat > lib/firebase_options.dart <<'DART'
class DefaultFirebaseOptions {
  static const String apiKey = 'PLACEHOLDER_API_KEY';
  static const String appId = '1:000000000000:android:placeholder';
  static const String messagingSenderId = '000000000000';
  static const String projectId = 'placeholder-project-id';
  static const String databaseURL = 'https://placeholder-project-id.firebaseio.com';
  static const String storageBucket = 'placeholder-project-id.appspot.com';
}
DART
          fi

      - name: Flutter pub get (verbose)
        run: flutter pub get --verbose

      - name: Run Flutter analyze (optional)
        run: flutter analyze || true

      - name: Build release APK
        run: flutter build apk --release --no-shrink

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
